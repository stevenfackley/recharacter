name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "src/**"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-web:
    name: Build web image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: |
            ghcr.io/stevenfackley/recharacter-web:latest
            ghcr.io/stevenfackley/recharacter-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-routing:
    name: Build routing image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ReCharacter.RoutingApi/Dockerfile
          push: true
          tags: |
            ghcr.io/stevenfackley/recharacter-routing:latest
            ghcr.io/stevenfackley/recharacter-routing:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Qavren-Web-Server
    needs: [build-web, build-routing]
    runs-on: ubuntu-latest
    steps:
      - name: Pull and restart the stack over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            # GHCR images are private; the workflow's own GITHUB_TOKEN has read
            # access to repo-linked packages, so each deploy logs in fresh — the
            # box never needs a long-lived PAT.
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ~/recharacter
            docker compose pull
            docker compose up -d
            docker image prune -f
            docker logout ghcr.io
